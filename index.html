  <title>MORE專屬記帳</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #ede0d4; font-family: -apple-system, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  @keyframes petWiggle {
    0%   { transform: rotate(0deg); }
    20%  { transform: rotate(4deg); }
    40%  { transform: rotate(-4deg); }
    60%  { transform: rotate(3deg); }
    80%  { transform: rotate(-3deg); }
    100% { transform: rotate(0deg); }
  }
  @keyframes petBounce {
    0%   { transform: translateY(0px) scale(1); }
    20%  { transform: translateY(-18px) scale(1.05); }
    40%  { transform: translateY(0px) scale(0.97); }
    55%  { transform: translateY(-10px) scale(1.03); }
    70%  { transform: translateY(0px) scale(0.99); }
    85%  { transform: translateY(-5px) scale(1.01); }
    100% { transform: translateY(0px) scale(1); }
  }
  @keyframes petStep {
    0%   { transform: translateX(0px) rotate(0deg); }
    25%  { transform: translateX(-12px) rotate(-3deg); }
    50%  { transform: translateX(0px) rotate(0deg); }
    75%  { transform: translateX(12px) rotate(3deg); }
    100% { transform: translateX(0px) rotate(0deg); }
  }
  @keyframes petSpin {
    0%   { transform: rotate(0deg); }
    30%  { transform: rotate(-15deg); }
    60%  { transform: rotate(15deg); }
    100% { transform: rotate(0deg); }
  }
  @keyframes petNod {
    0%   { transform: translateY(0px) scaleY(1); }
    30%  { transform: translateY(6px) scaleY(0.96); }
    60%  { transform: translateY(-4px) scaleY(1.03); }
    100% { transform: translateY(0px) scaleY(1); }
  }
  @keyframes petShake {
    0%   { transform: translateX(0px); }
    15%  { transform: translateX(-8px); }
    30%  { transform: translateX(8px); }
    45%  { transform: translateX(-6px); }
    60%  { transform: translateX(6px); }
    75%  { transform: translateX(-3px); }
    90%  { transform: translateX(3px); }
    100% { transform: translateX(0px); }
  }
  .pet-wiggle {
    animation: petWiggle 2.4s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .pet-bounce {
    animation: petBounce 0.7s ease-out;
    transform-origin: bottom center;
  }
  .pet-step {
    animation: petStep 0.8s ease-in-out;
    transform-origin: bottom center;
  }
  .pet-spin {
    animation: petSpin 0.6s ease-in-out;
    transform-origin: bottom center;
  }
  .pet-nod {
    animation: petNod 0.6s ease-in-out;
    transform-origin: bottom center;
  }
  .pet-shake {
    animation: petShake 0.5s ease-in-out;
    transform-origin: bottom center;
  }
  @keyframes petLie {
    0%   { transform: rotate(0deg) translateY(0px); }
    100% { transform: rotate(90deg) translateY(10px); }
  }
  @keyframes petTickle {
    0%   { transform: rotate(80deg) scale(0.7) translateY(-30px); }
    25%  { transform: rotate(70deg) scale(0.72) translateY(-28px); }
    50%  { transform: rotate(85deg) scale(0.68) translateY(-32px); }
    75%  { transform: rotate(73deg) scale(0.71) translateY(-29px); }
    100% { transform: rotate(80deg) scale(0.7) translateY(-30px); }
  }
  @keyframes petTickleHappy {
    0%   { transform: rotate(0deg) scale(1); }
    20%  { transform: rotate(-8deg) scale(1.08); }
    40%  { transform: rotate(8deg) scale(1.06); }
    60%  { transform: rotate(-6deg) scale(1.04); }
    80%  { transform: rotate(6deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .pet-lie {
    animation: petLie 0.5s ease-out forwards;
    transform-origin: bottom center;
  }
  .pet-lying {
    transform: rotate(80deg) scale(0.7) translateY(-30px);
    transform-origin: center center;
  }
  .pet-tickle-lying {
    animation: petTickle 0.6s ease-in-out;
    transform-origin: bottom center;
  }
  .pet-tickle-happy {
    animation: petTickleHappy 0.5s ease-in-out;
    transform-origin: bottom center;
  }
  </style>

        <div style={{ position: "absolute", top: "10%", right: "5%", fontSize: 22 }}>😴</div>
      )}
      {mood === "happy" && !tickling && (
        <div style={{ position: "absolute", top: 0, right: 0, fontSize: 22 }}>✨</div>
      )}
      {tickling && (
        <div style={{ position: "absolute", top: 0, right: 0, fontSize: 22 }}>🤣</div>
      )}
    </div>
  );
};

function PetTab({ coins }) {
  const [pet, setPet] = useState(() => {
    try {
      const s = localStorage.getItem(LS_PET);
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  });
  const [msg, setMsg] = useState("");
  const [confirmReset, setConfirmReset] = useState(false);
  const [choosing, setChoosing] = useState(!pet);
  const [showShop, setShowShop] = useState(false);

  const savePet = (p) => {
    setPet(p);
    try { localStorage.setItem(LS_PET, JSON.stringify(p)); } catch {}
  };

  const showMsg = (m) => { setMsg(m); setTimeout(() => setMsg(""), 2000); };

  const choosePet = (petDef) => {
    const newPet = { type: petDef.id, name: petDef.name, title: petDef.title, color: petDef.color, level: 1, exp: 0, hungry: 0, mood: 0, clean: 0, spent: 0 };
    savePet(newPet);
    setChoosing(false);
    showMsg(`${petDef.name} 加入 MORE 家族！🎉`);
  };

  const buyItem = (item) => {
    if (!pet) return;
    const available = coins - (pet.spent || 0);
    if (available < item.cost) { showMsg("硬幣不夠！多多進貨賺幣 💰"); return; }
    const updated = {
      ...pet,
      spent: (pet.spent || 0) + item.cost,
      hungry: Math.min(100, pet.hungry + (item.effect.hungry || 0)),
      mood: Math.min(100, pet.mood + (item.effect.mood || 0)),
      clean: Math.min(100, pet.clean + (item.effect.clean || 0)),
      exp: (pet.exp || 0) + item.cost,
    };
    // 升級
    const newLevel = Math.floor(updated.exp / 100) + 1;
    if (newLevel > (pet.level || 1)) {
      updated.level = newLevel;
      showMsg(`🎊 升級了！等級 ${newLevel}`);
    } else {
      showMsg(`${item.icon} ${item.name} 購買成功！`);
    }
    savePet(updated);
    setShowShop(false);
  };

  // 可用硬幣
  const availableCoins = Math.max(0, coins - (pet?.spent || 0));

  const petDef = pet ? PETS.find(p => p.id === pet.type) : null;

  // 寵物狀態表情

    if (!pet) return "idle";

            <button onClick={() => setShowShop(false)} style={{ marginTop: 12, width: "100%", padding: 12, borderRadius: 12, border: "1px solid #DBC8B6", background: "#fff", color: "#A59482", cursor: "pointer", fontSize: 14 }}>關閉</button>

      <Card style={{ background: "linear-gradient(135deg,#7a6352,#9A6852)", padding: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>

const Card = ({ children, style = {} }) => (
  <div style={{ background: "#fff", borderRadius: 16, padding: 16, marginBottom: 14, boxShadow: "0 1px 10px rgba(139,90,43,0.09)", ...style }}>{children}</div>
);
const Label = ({ children }) => (
  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", color: "#A59482", textTransform: "uppercase", marginBottom: 6 }}>{children}</div>
);
const NumInput = ({ value, onChange, placeholder = "0" }) => (
  <input type="number" min="0" value={value} placeholder={placeholder}
    onChange={e => onChange(e.target.value === "" ? "" : Number(e.target.value))}
    style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "9px 10px", fontSize: 16, fontFamily: "monospace", background: "#faf6f2", color: "#A59482", outline: "none", boxSizing: "border-box" }} />
);

const DateInput = ({ value, onChange }) => {
  // Convert display format (2026/4/16) to input format (2026-04-16)
  const toInputVal = (v) => {
    if (!v) return "";
    const parts = v.replace(/\//g, "-").split("-");
    if (parts.length !== 3) return "";
    return `${parts[0]}-${parts[1].padStart(2,"0")}-${parts[2].padStart(2,"0")}`;
  };
  // Convert input format back to display format
  const toDisplay = (v) => {
    if (!v) return "";
    const parts = v.split("-");
    if (parts.length !== 3) return "";
    return `${parts[0]}/${parseInt(parts[1])}/${parseInt(parts[2])}`;
  };
  return (
    <input type="date" value={toInputVal(value)}
      onChange={e => onChange(toDisplay(e.target.value))}
      style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "9px 10px",
        fontSize: 15, background: "#faf6f2", color: value ? "#3d2b1f" : "#C4B1A0",
        outline: "none", boxSizing: "border-box", WebkitAppearance: "none" }} />
  );
};

const TextInput = ({ value, onChange, placeholder }) => (
  <input type="text" value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)}
    style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "9px 10px", fontSize: 15, background: "#faf6f2", color: "#A59482", outline: "none", boxSizing: "border-box" }} />
);

function ProductPicker({ items, onAdd, onClose, productList, level }) {
  const [search, setSearch] = useState("");
  const source = productList || PRODUCTS;
  const filtered = source.filter(p => p.name.includes(search) && !items.find(i => i.name === p.name));

  const getDisplayCost = (p) => {
    if (level && PARTNER_LEVEL_COSTS && PARTNER_LEVEL_COSTS[level]) {
      const idx = PARTNER_PRODUCTS.findIndex(pr => pr.name === p.name);
      if (idx >= 0) return PARTNER_LEVEL_COSTS[level][idx];
    }
    return p.cost || 0;
  };

  return (
    <div>
      <input autoFocus value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋商品名稱..."
        style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "9px 10px", fontSize: 15, background: "#faf6f2", outline: "none", boxSizing: "border-box", marginBottom: 8 }} />
      <div style={{ maxHeight: 220, overflowY: "auto" }}>
        {filtered.map(p => (
          <div key={p.name} onClick={() => onAdd(p)} style={{ padding: "10px 12px", borderRadius: 8, marginBottom: 4, background: "#f7f2ee", cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14, color: "#A59482" }}>{p.name}</span>
            <span style={{ fontSize: 12, color: "#A59482", fontFamily: "monospace" }}>成本 {ntd(getDisplayCost(p))}</span>
          </div>
        ))}
        {filtered.length === 0 && <div style={{ textAlign: "center", color: "#C4B1A0", padding: 16 }}>找不到商品</div>}
      </div>
      <button onClick={onClose} style={{ width: "100%", marginTop: 8, padding: 9, borderRadius: 8, border: "1px solid #DBC8B6", background: "#fff", color: "#A59482", cursor: "pointer", fontSize: 14 }}>取消</button>

            </div>
            {selectedCust && <div style={{ background: "#f0faf4", borderRadius: 8, padding: "7px 12px", marginBottom: 14, fontSize: 13, color: "#1a6b3a" }}>✓ 已連結：{selectedCust.name}</div>}
          </>
        )}
        {!isSale && (
          <><Label>備註</Label><div style={{ marginBottom: 14 }}><TextInput value={customer} onChange={setCustomer} placeholder="例：3月補貨" /></div></>
        )}
        <Label>備註</Label>

        </div>

function SalesTab({ onSave, customers, records = [] }) {
  const [level, setLevel] = useState("一級督導輔導");
  const [priceType, setPriceType] = useState(0);
  const [items, setItems] = useState([]);
  const [shipping, setShipping] = useState("");
  const [showPicker, setShowPicker] = useState(false);
  const [showSave, setShowSave] = useState(false);
  const [flash, setFlash] = useState(false);

  const top5 = (() => {
    const tally = {};
    records.filter(r => r.type === "sale").forEach(r => {
      r.items.forEach(i => { tally[i.name] = (tally[i.name] || 0) + (Number(i.qty) || 0); });
    });
    return Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 5);
  })();

  const getCost = (name) => {
    const idx = PARTNER_PRODUCTS.findIndex(p => p.name === name);
    return idx >= 0 ? (PARTNER_LEVEL_COSTS[level][idx] || 0) : 0;
  };

  const handleLevelChange = (newLevel) => {
    setLevel(newLevel);
    setItems(prev => prev.map(i => ({ ...i, cost: PARTNER_LEVEL_COSTS[newLevel][PARTNER_PRODUCTS.findIndex(p => p.name === i.name)] || i.cost })));
  };

  const handlePriceTypeChange = (newType) => {
    setPriceType(newType);
    setItems(prev => prev.map(i => {
      const p = PARTNER_PRODUCTS.find(pr => pr.name === i.name);
      return { ...i, price: p ? p.prices[newType] : i.price };
    }));
  };

  const addItem = (p) => {
    const cost = getCost(p.name);
    const price = p.prices ? p.prices[priceType] : 0;
    setItems(prev => {
      const exist = prev.find(i => i.name === p.name);
      if (exist) return prev.map(i => i.name === p.name ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { name: p.name, cost, price, qty: 1 }];
    });
    setShowPicker(false);
  };
  const updateItem = (name, field, val) => setItems(prev => prev.map(i => i.name === name ? { ...i, [field]: val } : i));
  const removeItem = (name) => setItems(prev => prev.filter(i => i.name !== name));

  const totalRevenue = items.reduce((s, i) => s + (Number(i.price)||0) * (Number(i.qty)||0), 0);
  const totalCost = items.reduce((s, i) => s + i.cost * (Number(i.qty)||0), 0);
  const ship = Number(shipping) || 0;
  const netProfit = totalRevenue - totalCost - ship;
  const margin = totalRevenue > 0 ? (netProfit / totalRevenue * 100) : 0;

  const handleSave = (customer, note, customerId) => {
    const record = { id: nowId(), date: today(), type: "sale", level, customer, note, customerId,
      items: items.map(i => ({ name: i.name, qty: Number(i.qty)||0, unitPrice: Number(i.price)||0, unitCost: i.cost, priceLabel: PRICE_LABELS[priceType] })),
      totalRevenue, totalCost, shipping: ship, netProfit, margin: margin.toFixed(1) };
    onSave(record);
    setShowSave(false);
    setFlash(true);
    setTimeout(() => { setFlash(false); setItems([]); setShipping(""); }, 1800);
  };

  const levelColors = { "一級督導輔導":"#e3d3b4","二級督導輔導":"#d2cac1","三級督導輔導":"#d6c6b6","三級零售加盟":"#c3b7a7","實習加盟":"#ebe7d1" };

  if (flash) return <SuccessFlash />;
  return (
    <div>
      {showSave && <SaveModal isSale profit={netProfit} customers={customers} onSave={handleSave} onCancel={() => setShowSave(false)} />}
      {showPicker && <ProductPicker items={items} onAdd={addItem} onClose={() => setShowPicker(false)} productList={PARTNER_PRODUCTS} level={level} />}
      <Card>
        <Label>我的階級</Label>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
          {PARTNER_LEVELS.map(l => (
            <button key={l} onClick={() => handleLevelChange(l)}
              style={{ padding: "7px 12px", borderRadius: 20, border: "2px solid " + (level === l ? "#9a7050" : "#DBC8B6"),
                background: level === l ? levelColors[l] : "#faf6f2", color: "#5a3a1a",
                cursor: "pointer", fontWeight: level === l ? 700 : 400, fontSize: 12, minWidth: "30%", textAlign: "center" }}>
              {level === l ? "✓ " : ""}{l}
            </button>
          ))}
        </div>
      </Card>
      <Card>
        <Label>售價類型</Label>
        <div style={{ display: "flex", gap: 8 }}>
          {PRICE_LABELS.map((l, i) => (
            <button key={i} onClick={() => handlePriceTypeChange(i)}
              style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer",
                background: priceType === i ? "#C6A992" : "#ede0d4",
                color: priceType === i ? "#fff" : "#A59482", fontWeight: 600, fontSize: 13 }}>
              {l}
            </button>
          ))}
        </div>
      </Card>
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <Label>商品明細</Label>
          <button onClick={() => setShowPicker(true)}
            style={{ padding: "7px 16px", borderRadius: 20, border: "none", background: "linear-gradient(135deg,#A59482,#C6A992)", color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>
            ＋ 選擇商品
          </button>
        </div>
        {items.length === 0 && <div style={{ textAlign: "center", color: "#C4B1A0", padding: "20px 0", fontSize: 13 }}>☝️ 點「選擇商品」開始記錄</div>}
        {items.map(i => (
          <div key={i.name} style={{ background: "#faf6f2", borderRadius: 10, padding: "10px 12px", marginBottom: 8 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: "#5a4030" }}>{i.name}</span>
              <button onClick={() => removeItem(i.name)} style={{ border: "none", background: "none", color: "#c0392b", cursor: "pointer", fontSize: 13 }}>✕</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              <div>
                <Label>進貨成本</Label>
                <div style={{ fontSize: 13, color: "#A59482", padding: "6px 0", fontWeight: 600 }}>{ntd(i.cost)}</div>
              </div>
              <div>
                <Label>售價</Label>
                <div style={{ fontSize: 13, color: "#C6A992", padding: "6px 0", fontWeight: 700 }}>{ntd(i.price)}</div>
              </div>
              <div>
                <Label>數量</Label>
                <input type="number" value={i.qty} onChange={e => updateItem(i.name, "qty", Number(e.target.value))}
                  style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "7px 8px", fontSize: 14, background: "#fff", color: "#5a4030" }} />
              </div>
            </div>
            {Number(i.qty) > 0 && <div style={{ fontSize: 12, color: "#1a6b3a", marginTop: 4 }}>淨利：{ntd((i.price - i.cost) * Number(i.qty))}</div>}
          </div>
        ))}
      </Card>
      {items.length > 0 && (
        <>
          <Card>
            <Label>運費支出</Label>
            <input type="number" value={shipping} onChange={e => setShipping(e.target.value)} placeholder="0"
              style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "10px 12px", fontSize: 15, background: "#faf6f2" }} />
          </Card>
          <Card style={{ background: "linear-gradient(135deg,#7a6352,#9A6852)", padding: 18 }}>
            <div style={{ color: "#DBC8B6", fontSize: 12, fontWeight: 700, marginBottom: 12 }}>💰 本筆統計</div>
            {[["總金額", ntd(totalRevenue)],["進貨成本", ntd(totalCost)],["運費支出", ship > 0 ? `-${ntd(ship)}` : ntd(0)]].map(([l,v]) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ color: "#DBC8B6", fontSize: 13 }}>{l}</span>
                <span style={{ color: "#fff", fontFamily: "monospace", fontSize: 13 }}>{v}</span>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: netProfit < 0 ? "rgba(192,57,43,0.15)" : "rgba(255,255,255,0.12)", borderRadius: 10, padding: "12px 14px" }}>
              <span style={{ color: netProfit < 0 ? "#f5a89e" : "#f5e6de", fontSize: 14, fontWeight: 700 }}>淨利潤</span>
              <span style={{ color: netProfit < 0 ? "#ff8070" : "#f5e6de", fontFamily: "monospace", fontSize: 22, fontWeight: 700 }}>{ntd(netProfit)}</span>
            </div>
            <div style={{ textAlign: "center", color: "#DBC8B6", fontSize: 13, margin: "8px 0 16px" }}>利潤率 {margin.toFixed(1)}%</div>
            <button onClick={() => setShowSave(true)}
              style={{ width: "100%", padding: 14, borderRadius: 12, border: "2px solid rgba(201,168,128,0.5)", background: "rgba(255,255,255,0.12)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>
              💾 儲存這筆紀錄
            </button>
          </Card>
        </>
      )}
      {top5.length > 0 && (
        <Card>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#A59482", letterSpacing: "0.08em", marginBottom: 10 }}>🏆 銷售排行榜</div>
          {top5.map(([name, qty], i) => (
            <div key={name} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: i < 4 ? 8 : 0 }}>
              <div style={{ width: 24, height: 24, borderRadius: "50%", background: ["#c6a028","#9a9a9a","#c6804a","#A59482","#A59482"][i], color: "#fff", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{i+1}</div>
              <div style={{ flex: 1, fontSize: 14, color: "#5a4030" }}>{name}</div>
              <div style={{ fontSize: 13, color: "#A59482", fontWeight: 600 }}>{qty} 件</div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

function StockTab({ onSave }) {
  const [level, setLevel] = useState("一級督導輔導");
  const [items, setItems] = useState([]);
  const [otherCost, setOtherCost] = useState("");
  const [showPicker, setShowPicker] = useState(false);
  const [showSave, setShowSave] = useState(false);
  const [flash, setFlash] = useState(false);

  const getCost = (name) => {
    const idx = PARTNER_PRODUCTS.findIndex(p => p.name === name);
    return idx >= 0 ? PARTNER_LEVEL_COSTS[level][idx] : 0;
  };

  const handleLevelChange = (newLevel) => {
    setLevel(newLevel);
    setItems(prev => prev.map(i => ({ ...i, cost: PARTNER_LEVEL_COSTS[newLevel][PARTNER_PRODUCTS.findIndex(p => p.name === i.name)] || i.cost })));
  };

  const addItem = (p) => {
    const cost = getCost(p.name);
    setItems(prev => {
      const exist = prev.find(i => i.name === p.name);
      if (exist) return prev.map(i => i.name === p.name ? { ...i, qty: (Number(i.qty)||0) + 1 } : i);
      return [...prev, { name: p.name, cost, qty: 1 }];
    });
    setShowPicker(false);
  };
  const updateQty = (name, qty) => setItems(prev => prev.map(i => i.name === name ? { ...i, qty } : i));
  const removeItem = (name) => setItems(prev => prev.filter(i => i.name !== name));
  const totalStock = items.reduce((s, i) => s + i.cost * (Number(i.qty)||0), 0);
  const other = Number(otherCost) || 0;
  const totalCost = totalStock + other;

  const handleSave = (label, note) => {
    onSave({ id: nowId(), date: today(), type: "stock", level, customer: label, note,
      items: items.map(i => ({ name: i.name, qty: Number(i.qty)||0, unitCost: i.cost })),
      totalStock, otherCost: other, totalCost });
    setShowSave(false); setFlash(true);
    setTimeout(() => { setFlash(false); setItems([]); setOtherCost(""); }, 1800);
  };

  const levelColors = { "一級督導輔導":"#e3d3b4","二級督導輔導":"#d2cac1","三級督導輔導":"#d6c6b6","三級零售加盟":"#c3b7a7","實習加盟":"#ebe7d1" };

  if (flash) return <SuccessFlash />;
  return (
    <div>
      {showSave && <SaveModal isSale={false} total={totalCost} customers={[]} onSave={handleSave} onCancel={() => setShowSave(false)} />}
      {showPicker && <ProductPicker items={items} onAdd={addItem} onClose={() => setShowPicker(false)} productList={PARTNER_PRODUCTS} level={level} />}

      {/* 階級選擇 */}
      <Card>
        <Label>我的階級</Label>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
          {PARTNER_LEVELS.map(l => (
            <button key={l} onClick={() => handleLevelChange(l)}
              style={{ padding: "7px 12px", borderRadius: 20, border: `2px solid ${level === l ? "#9a7050" : "#DBC8B6"}`,
                background: level === l ? levelColors[l] : "#faf6f2", color: "#5a3a1a",
                cursor: "pointer", fontWeight: level === l ? 700 : 400, fontSize: 12, minWidth: "30%", textAlign: "center" }}>
              {level === l ? "✓ " : ""}{l}
            </button>
          ))}
        </div>
      </Card>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <Label>選擇進貨商品</Label>
          <button onClick={() => setShowPicker(true)}
            style={{ padding: "7px 16px", borderRadius: 20, border: "none", background: "linear-gradient(135deg,#A59482,#C6A992)", color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>
            ＋ 選擇商品
          </button>
        </div>
        {items.map(i => (
          <div key={i.name} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: "1px solid #ede0d4" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#5a4030" }}>{i.name}</div>
              <div style={{ fontSize: 12, color: "#A59482" }}>單價 {ntd(i.cost)}</div>
            </div>
            <input type="number" value={i.qty} onChange={e => updateQty(i.name, e.target.value)} placeholder="數量"
              style={{ width: 60, border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "7px 8px", fontSize: 14, textAlign: "center", background: "#faf6f2" }} />
            <div style={{ fontSize: 13, fontFamily: "monospace", color: "#A59482", minWidth: 60, textAlign: "right" }}>{ntd(i.cost * (Number(i.qty)||0))}</div>
            <button onClick={() => removeItem(i.name)} style={{ border: "none", background: "none", color: "#c0392b", cursor: "pointer", fontSize: 16 }}>✕</button>
          </div>
        ))}
        {items.length === 0 && <div style={{ textAlign: "center", color: "#C4B1A0", padding: "30px 0", fontSize: 13 }}>☝️ 點「選擇商品」開始記錄</div>}
      </Card>

      {items.length > 0 && (
        <>
          <Card><Label>其他費用</Label>
            <input type="number" value={otherCost} onChange={e => setOtherCost(e.target.value)} placeholder="選填"
              style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "10px 12px", fontSize: 15, background: "#faf6f2" }} />
          </Card>
          <Card style={{ background: "linear-gradient(135deg,#A59482,#C6A992)", padding: 18 }}>
            <div style={{ color: "#DBC8B6", fontSize: 12, fontWeight: 700, marginBottom: 12 }}>📦 進貨成本總計</div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.12)", borderRadius: 10, padding: "12px 14px", marginBottom: 16 }}>
              <span style={{ color: "#DBC8B6", fontSize: 14, fontWeight: 700 }}>總進貨金額</span>
              <span style={{ color: "#fff", fontFamily: "monospace", fontSize: 22, fontWeight: 700 }}>{ntd(totalCost)}</span>
            </div>
            <button onClick={() => setShowSave(true)}
              style={{ width: "100%", padding: 14, borderRadius: 12, border: "2px solid rgba(201,168,128,0.5)", background: "rgba(255,255,255,0.12)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>
              💾 儲存這筆進貨
            </button>
          </Card>
        </>
      )}
    </div>
  );
}


function RecordCard({ r, expanded, setExpanded, setDeleting }) {
  const isBranch = r.type === "branch";
  const isSale = r.type === "sale";

  const tagStyle = isBranch
    ? { background: "#f5f0e8", color: "#9a7050" }
    : isSale
    ? { background: "#ede0d4", color: "#7a4a28" }
    : { background: "#fef3e8", color: "#c17d2a" };

  return (
    <Card key={r.id} style={{ padding: 0, overflow: "hidden" }}>
      <div onClick={() => setExpanded(expanded === r.id ? null : r.id)} style={{ padding: "14px 16px", cursor: "pointer" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 20, ...tagStyle, whiteSpace: "nowrap" }}>
                {isBranch ? "🏪 夥伴" : isSale ? "銷售" : "進貨"}
              </span>
              <span style={{ fontSize: 12, color: "#C4B1A0" }}>{r.date}</span>
            </div>
            {isBranch && r.partner && <div style={{ fontSize: 14, color: "#A59482", fontWeight: 600 }}>{r.partner} · {r.level}</div>}
            {!isBranch && r.customer && <div style={{ fontSize: 14, color: "#A59482", fontWeight: 600 }}>{r.customer}</div>}
            {r.note && <div style={{ fontSize: 12, color: "#A59482" }}>{r.note}</div>}
            <div style={{ fontSize: 12, color: "#C4B1A0", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {isBranch
                ? r.items.filter(i => Number(i.qty) > 0).map(i => `${i.product}×${i.qty}`).join("、")
                : r.items.map(i => `${i.name}×${i.qty}`).join("、")}
            </div>
          </div>
          <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 10 }}>
            <div style={{ fontSize: 16, fontFamily: "monospace", fontWeight: 700, color: isBranch ? "#9a7050" : isSale ? (r.netProfit >= 0 ? "#7a4a28" : "#c0392b") : "#A59482" }}>
              {isBranch ? ntd(r.netProfit) : isSale ? ntd(r.netProfit) : ntd(r.totalCost)}
            </div>
            <div style={{ fontSize: 11, color: "#C4B1A0" }}>
              {isBranch ? "夥伴淨利" : isSale ? `利潤率 ${r.margin}%` : "進貨成本"}
            </div>
          </div>
        </div>
      </div>
      {expanded === r.id && (
        <div style={{ borderTop: "1px solid #ede0d4", padding: "12px 16px", background: "#f7f2ee" }}>
          {isBranch ? (
            <>
              {r.items.filter(i => Number(i.qty) > 0).map((i, idx) => (
                <div key={idx} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, color: "#5a4030" }}>{i.product} × {i.qty}</span>
                  <span style={{ fontSize: 13, fontFamily: "monospace", color: "#1a6b3a" }}>+{ntd((Number(i.price) - Number(i.cost)) * Number(i.qty))}</span>
                </div>
              ))}
              {r.shipping > 0 && <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}><span style={{ fontSize: 13, color: "#5a4030" }}>運費</span><span style={{ fontSize: 13, color: "#c0392b" }}>-{ntd(r.shipping)}</span></div>}
              <div style={{ height: 1, background: "#DBC8B6", margin: "10px 0" }} />
              <div style={{ fontSize: 12, color: "#A59482", fontFamily: "monospace", lineHeight: 1.8 }}>
                進貨成本 {ntd(r.totalStock)}<br />
                <span style={{ color: "#9a7050", fontWeight: 700 }}>夥伴淨利 {ntd(r.netProfit)}</span>
              </div>
            </>
          ) : (
            <>
              {r.items.map(i => (

  const allRecords = [

  const getYearMonth = (r) => {

    return { year: d.getFullYear(), month: d.getMonth() + 1 };

function BranchTab() {
  const [records, setRecords] = useState(() => {
    try { const s = localStorage.getItem(LS_BRANCH); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [showForm, setShowForm] = useState(false);

  const [items, setItems] = useState([{ product: "", price: 0, cost: 0, qty: 0 }]);
  const [shipping, setShipping] = useState(0);
  const [note, setNote] = useState("");
  const [deleting, setDeleting] = useState(null);

  const save = (r) => { try { localStorage.setItem(LS_BRANCH, JSON.stringify(r)); } catch {} };

  // 選商品時自動帶入：我的成本 + 夥伴售價（夥伴階級的進貨價）
  const handleProductChange = (i, product) => {
    const idx = PARTNER_PRODUCTS.findIndex(p => p.name === product);
    const myCost = idx >= 0 ? (PARTNER_LEVEL_COSTS[level]?.[idx] || 0) : 0;
    const partnerPrice = idx >= 0 ? (PARTNER_LEVEL_COSTS[partnerLevel]?.[idx] || 0) : 0;
    const n = [...items];
    n[i] = { ...n[i], product, cost: myCost, price: partnerPrice };
    setItems(n);
  };

  // 切換我的階級時更新成本
  const handleLevelChange = (newLevel) => {
    setLevel(newLevel);
    const updated = items.map(it => {
      const idx = PARTNER_PRODUCTS.findIndex(p => p.name === it.product);
      if (idx < 0) return it;
      return { ...it, cost: PARTNER_LEVEL_COSTS[newLevel]?.[idx] || 0 };
    });
    setItems(updated);
  };

  // 切換夥伴階級時更新售價
  const handlePartnerLevelChange = (newLevel) => {
    setPartnerLevel(newLevel);
    const updated = items.map(it => {
      const idx = PARTNER_PRODUCTS.findIndex(p => p.name === it.product);
      if (idx < 0) return it;
      return { ...it, price: PARTNER_LEVEL_COSTS[newLevel]?.[idx] || 0 };
    });
    setItems(updated);
  };

  const addItem = () => setItems([...items, { product: "", price: 0, cost: 0, qty: 0 }]);
  const updateItem = (i, k, v) => { const n = [...items]; n[i][k] = v; setItems(n); };
  const removeItem = (i) => setItems(items.filter((_, idx) => idx !== i));

  const calcNet = (itemList, ship) => {
    const revenue = itemList.reduce((s, it) => s + (Number(it.price) - Number(it.cost)) * Number(it.qty), 0);
    return revenue - Number(ship || 0);
  };

  const handleSave = () => {
    if (!partner.trim()) return;
    const totalStock = items.reduce((s, it) => s + Number(it.cost) * Number(it.qty), 0);
    const totalRevenue = items.reduce((s, it) => s + Number(it.price) * Number(it.qty), 0);
    const netProfit = calcNet(items, shipping);
    const rec = { id: nowId(), partner: partner.trim(), level, partnerLevel, date, items, shipping: Number(shipping), totalStock, totalRevenue, netProfit, note };
    const updated = [rec, ...records];
    setRecords(updated);
    save(updated);
    setShowForm(false);
    setPartner(""); setLevel("一級督導輔導"); setDate(todayFull()); setItems([{ product: "", price: 0, cost: 0, qty: 0 }]); setShipping(0); setNote("");
  };

  const handleDelete = (id) => {
    const updated = records.filter(r => r.id !== id);
    setRecords(updated);
    save(updated);
    setDeleting(null);
  };

  const totalNet = records.reduce((s, r) => s + r.netProfit, 0);
  const totalStock = records.reduce((s, r) => s + r.totalStock, 0);
  const totalRevenueBranch = records.reduce((s, r) => s + (r.totalRevenue || 0), 0);

  // 分店銷售前三名
  const branchTop3 = (() => {
    const tally = {};
    records.forEach(r => {
      (r.items || []).filter(i => Number(i.qty) > 0).forEach(i => {
        tally[i.product] = (tally[i.product] || 0) + Number(i.qty);
      });
    });
    return Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 5);
  })();

  const levelColors = {
    "一級督導輔導":    "#e3d3b4",
    "二級督導輔導":    "#d2cac1",
    "三級督導輔導":    "#d6c6b6",
    "三級零售加盟":"#c3b7a7",
    "實習加盟":  "#ebe7d1",
  };

  return (
    <div>
      {deleting && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#fff", borderRadius: 20, padding: 24, width: "100%", maxWidth: 320, textAlign: "center" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🗑️</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#A59482", marginBottom: 16 }}>確定刪除這筆分店收入？</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setDeleting(null)} style={{ flex: 1, padding: 12, borderRadius: 12, border: "1.5px solid #DBC8B6", background: "#fff", color: "#A59482", cursor: "pointer" }}>取消</button>
              <button onClick={() => handleDelete(deleting)} style={{ flex: 1, padding: 12, borderRadius: 12, border: "none", background: "#c0392b", color: "#fff", cursor: "pointer", fontWeight: 700 }}>刪除</button>
            </div>
          </div>
        </div>
      )}

      {/* 新增表單 */}
      {showForm && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, overflowY: "auto" }}>
          <div style={{ background: "#fff", borderRadius: "20px 20px 0 0", padding: 20, marginTop: 60, minHeight: "calc(100vh - 60px)", boxSizing: "border-box" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#A59482" }}>📋 新增分店收入</div>
              <button onClick={() => setShowForm(false)} style={{ border: "none", background: "none", fontSize: 22, color: "#C4B1A0", cursor: "pointer" }}>✕</button>
            </div>

            <Card>
              <Label>夥伴名字</Label>
              <TextInput value={partner} onChange={setPartner} placeholder="例：Jamie" />
            </Card>

            <Card>
              <Label>夥伴階級</Label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
                {PARTNER_LEVELS.map(l => (
                  <button key={l} onClick={() => handlePartnerLevelChange(l)}
                    style={{ padding: "8px 10px", borderRadius: 10, border: `2px solid ${partnerLevel === l ? "#9a7050" : "#DBC8B6"}`, background: partnerLevel === l ? levelColors[l] : "#faf6f2", color: partnerLevel === l ? "#5a3a1a" : "#A59482", cursor: "pointer", fontWeight: 700, fontSize: 13, textAlign: "center", minWidth: "30%" }}>
                    {partnerLevel === l ? "✓ " : ""}{l}
                  </button>
                ))}
              </div>
            </Card>

            <Card>
              <Label>日期</Label>
              <DateInput value={date} onChange={setDate} />
            </Card>

            <Card>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <Label>商品明細</Label>
                <button onClick={addItem} style={{ border: "none", background: "#ede0d4", color: "#C6A992", borderRadius: 8, padding: "4px 12px", fontSize: 13, cursor: "pointer" }}>＋ 新增</button>
              </div>
              {items.map((it, i) => (
                <div key={i} style={{ background: "#faf6f2", borderRadius: 10, padding: 12, marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: "#A59482", fontWeight: 700 }}>第 {i+1} 項</span>
                    {items.length > 1 && <button onClick={() => removeItem(i)} style={{ border: "none", background: "none", color: "#c0392b", cursor: "pointer", fontSize: 13 }}>✕</button>}
                  </div>
                  <select value={it.product} onChange={e => handleProductChange(i, e.target.value)}
                    style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "8px 10px", fontSize: 14, background: "#fff", marginBottom: 8, color: "#A59482" }}>
                    <option value="">選擇商品</option>
                    {PARTNER_PRODUCTS.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
                  </select>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                    <div>
                      <Label>我的成本</Label>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#7a4a28", padding: "8px 0" }}>{ntd(it.cost)}</div>
                    </div>
                    <div>
                      <Label>夥伴售價</Label>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#C6A992", padding: "8px 0" }}>{ntd(it.price)}</div>
                    </div>
                    <div>
                      <Label>數量</Label>
                      <NumInput value={it.qty} onChange={v => updateItem(i, "qty", v)} />
                    </div>
                  </div>
                  {it.product && Number(it.qty) > 0 && (
                    <div style={{ fontSize: 12, color: "#1a6b3a", marginTop: 4 }}>
                      淨利：{ntd((Number(it.price) - Number(it.cost)) * Number(it.qty))}
                    </div>
                  )}
                </div>
              ))}
            </Card>

            <Card>
              <Label>運費支出</Label>
              <NumInput value={shipping} onChange={setShipping} placeholder="0" />
            </Card>
            <Card>
              <Label>備註</Label>
              <TextInput value={note} onChange={setNote} placeholder="備註..." />
            </Card>

            {/* 預覽 */}
            <Card style={{ background: "#f7f2ee" }}>
              <Label>預覽</Label>
              <div style={{ fontSize: 13, color: "#A59482" }}>總進貨成本：{ntd(items.reduce((s,it) => s + Number(it.cost)*Number(it.qty), 0))}</div>
              <div style={{ fontSize: 13, color: "#A59482" }}>總營業額：{ntd(items.reduce((s,it) => s + Number(it.price)*Number(it.qty), 0))}</div>
              <div style={{ fontSize: 18, color: "#1a6b3a", fontWeight: 700, marginTop: 4 }}>預估淨利：{ntd(calcNet(items, shipping))}</div>
            </Card>

            <button onClick={handleSave} style={{ width: "100%", padding: 14, borderRadius: 14, border: "none", background: "linear-gradient(135deg,#7a6352,#9A6852)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700, marginBottom: 16 }}>
              💾 儲存
            </button>
          </div>
        </div>
      )}

      {/* 統計卡 */}
      <Card style={{ background: "linear-gradient(135deg,#7a6352,#9A6852)" }}>
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          <div>
            <div style={{ color: "#DBC8B6", fontSize: 11, fontWeight: 700, marginBottom: 4 }}>分店累計淨利</div>
            <div style={{ color: "#fff", fontSize: 22, fontWeight: 700 }}>{ntd(totalNet)}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ color: "#DBC8B6", fontSize: 11, fontWeight: 700, marginBottom: 4 }}>分店總業績</div>
            <div style={{ color: "#fff", fontSize: 22, fontWeight: 700 }}>{ntd(totalRevenueBranch)}</div>
          </div>
        </div>
      </Card>

      {branchTop3.length > 0 && (
        <Card>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#A59482", letterSpacing: "0.08em", marginBottom: 10 }}>🏆 分店銷售排行榜</div>
          {branchTop3.map(([name, qty], i) => (
            <div key={name} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: i < 4 ? 8 : 0 }}>
              <div style={{ width: 24, height: 24, borderRadius: "50%", background: ["#c6a028","#9a9a9a","#c6804a","#A59482","#A59482"][i], color: "#fff", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{i+1}</div>
              <div style={{ flex: 1, fontSize: 14, color: "#5a4030" }}>{name}</div>
              <div style={{ fontSize: 13, color: "#A59482", fontWeight: 600 }}>{qty} 件</div>
            </div>
          ))}
        </Card>
      )}

      {/* 我的階級 */}
      <Card>
        <Label>我的階級（自己的成本）</Label>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
          {PARTNER_LEVELS.map(l => (
            <button key={l} onClick={() => setLevel(l)}
              style={{ padding: "7px 12px", borderRadius: 20, border: `2px solid ${level === l ? "#9a7050" : "#DBC8B6"}`,
                background: level === l ? levelColors[l] : "#faf6f2", color: "#5a3a1a",
                cursor: "pointer", fontWeight: level === l ? 700 : 400, fontSize: 12, minWidth: "30%", textAlign: "center" }}>
              {level === l ? "✓ " : ""}{l}
            </button>
          ))}
        </div>
      </Card>

      <button onClick={() => setShowForm(true)} style={{ width: "100%", padding: 14, borderRadius: 14, border: "none", background: "linear-gradient(135deg,#A59482,#C6A992)", color: "#fff", cursor: "pointer", fontSize: 15, fontWeight: 700, marginBottom: 16, marginTop: 14 }}>
        ＋ 新增分店收入
      </button>

      {records.length === 0 && (
        <div style={{ textAlign: "center", color: "#C4B1A0", padding: "40px 0", fontSize: 14 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🏪</div>
          還沒有分店收入紀錄
        </div>
      )}

      {records.map(r => (
        <Card key={r.id} style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ background: "#faf6f2", padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #ede0d4" }}>
            <div>
              <span style={{ fontSize: 15, fontWeight: 700, color: "#A59482" }}>🐻 {r.partner}</span>
              <span style={{ fontSize: 11, marginLeft: 8, padding: "2px 8px", borderRadius: 10, background: levelColors[r.level] || "#e3d3b4", color: "#5a3a1a", fontWeight: 600 }}>{r.level}</span>
            </div>
            <span style={{ fontSize: 12, color: "#C4B1A0" }}>{r.date}</span>
          </div>
          <div style={{ padding: "10px 16px" }}>
            {r.items.filter(it => it.product && Number(it.qty) > 0).map((it, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#A59482", marginBottom: 3 }}>
                <span>{it.product} ×{it.qty}</span>
                <span style={{ color: "#1a6b3a" }}>+{ntd((Number(it.price) - Number(it.cost)) * Number(it.qty))}</span>
              </div>
            ))}
            {r.shipping > 0 && <div style={{ fontSize: 12, color: "#c0392b" }}>運費：-{ntd(r.shipping)}</div>}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, paddingTop: 8, borderTop: "1px solid #ede0d4" }}>
              <span style={{ fontSize: 12, color: "#C4B1A0" }}>進貨 {ntd(r.totalStock)}</span>
              <span style={{ fontSize: 16, fontWeight: 700, color: r.netProfit >= 0 ? "#1a6b3a" : "#c0392b" }}>{ntd(r.netProfit)}</span>
            </div>
            {r.note && <div style={{ fontSize: 12, color: "#C4B1A0", marginTop: 4 }}>備註：{r.note}</div>}
            <button onClick={() => setDeleting(r.id)} style={{ marginTop: 6, border: "none", background: "none", color: "#C4B1A0", cursor: "pointer", fontSize: 12 }}>🗑️ 刪除</button>
          </div>
        </Card>
      ))}
    </div>
  );
}


function CustomerForm({ customer, onSave, onCancel }) {
  const [name, setName] = useState(customer?.name || "");
  const [platform, setPlatform] = useState(customer?.platform || "蝦皮");
  const [buyCount, setBuyCount] = useState(customer?.buyCount || "首次購買");
  const [buyDate, setBuyDate] = useState(customer?.buyDate || todayFull());
  const [careDate, setCareDate] = useState(customer?.careDate || "");
  const [careNote, setCareNote] = useState(customer?.careNote || "");
  const [tags, setTags] = useState(customer?.tags || []);
  const [purchases, setPurchases] = useState(customer?.purchases || [{ date: "", product: "", note: "" }]);
  const [usage, setUsage] = useState(customer?.usage || { morning: "", noon: "", evening: "", sleep: "" });
  const toggleTag = (t) => setTags(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
  const addPurchase = () => setPurchases(prev => [...prev, { date: "", product: "", note: "" }]);
  const updatePurchase = (i, field, val) => setPurchases(prev => prev.map((p, idx) => idx === i ? { ...p, [field]: val } : p));
  const removePurchase = (i) => setPurchases(prev => prev.filter((_, idx) => idx !== i));
  const handleSave = () => { if (!name.trim()) return alert("請填入顧客名稱"); onSave({ id: customer?.id || nowId(), name: name.trim(), platform, buyCount, buyDate, careDate, careNote, tags, purchases, usage }); };
  return (
    <div style={{ position: "fixed", inset: 0, background: "#ede0d4", zIndex: 200, overflowY: "auto" }}>
      <div style={{ background: "linear-gradient(135deg,#A59482,#C6A992)", padding: "44px 20px 16px", color: "#fff", display: "flex", alignItems: "center", gap: 12 }}>
        <button onClick={onCancel} style={{ background: "none", border: "none", color: "#DBC8B6", fontSize: 22, cursor: "pointer", padding: 0 }}>←</button>
        <div style={{ fontSize: 18, fontWeight: 700 }}>{customer ? "編輯顧客" : "新增顧客"}</div>
      </div>
      <div style={{ padding: "16px 16px 80px" }}>
        <Card><Label>顧客名字 / 帳號</Label><TextInput value={name} onChange={setName} placeholder="例：Jamie/QQ.RUO" /></Card>
        <Card>
          <Label>購買平台</Label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {PLATFORMS.map(p => <button key={p} onClick={() => setPlatform(p)} style={{ padding: "7px 14px", borderRadius: 20, border: "none", cursor: "pointer", background: platform === p ? "#C6A992" : "#ede0d4", color: platform === p ? "#fff" : "#A59482", fontWeight: 600, fontSize: 13 }}>{p}</button>)}
          </div>
        </Card>
        <Card>
          <Label>購買次數</Label>
          <div style={{ display: "flex", gap: 8 }}>
            {BUY_COUNTS.map(b => <button key={b} onClick={() => setBuyCount(b)} style={{ flex: 1, padding: "8px 4px", borderRadius: 8, border: "none", cursor: "pointer", background: buyCount === b ? "#C6A992" : "#ede0d4", color: buyCount === b ? "#fff" : "#A59482", fontWeight: 600, fontSize: 11 }}>{b}</button>)}
          </div>
        </Card>
        <Card><Label>購買日期</Label><DateInput value={buyDate} onChange={setBuyDate} /></Card>
        <Card>
          <Label>標籤</Label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {TAGS.map(t => <button key={t} onClick={() => toggleTag(t)} style={{ padding: "7px 14px", borderRadius: 20, border: "none", cursor: "pointer", background: tags.includes(t) ? "#C6A992" : "#ede0d4", color: tags.includes(t) ? "#fff" : "#A59482", fontWeight: 600, fontSize: 13 }}>{t}</button>)}
          </div>
        </Card>
        <Card>
          <Label>已關心日期</Label>
          <DateInput value={careDate} onChange={setCareDate} />
          <div style={{ marginTop: 10 }}><Label>關心事項</Label><TextInput value={careNote} onChange={setCareNote} placeholder="例：試用、健康問題" /></div>
        </Card>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <Label>購買紀錄</Label>
            <button onClick={addPurchase} style={{ border: "none", background: "#ede0d4", color: "#C6A992", borderRadius: 8, padding: "5px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>＋ 新增</button>
          </div>
          {purchases.map((p, i) => (
            <div key={i} style={{ background: "#f7f2ee", borderRadius: 10, padding: 12, marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 13, color: "#A59482", fontWeight: 600 }}>第 {i + 1} 筆</span>
                {purchases.length > 1 && <button onClick={() => removePurchase(i)} style={{ border: "none", background: "none", color: "#c0392b", fontSize: 16, cursor: "pointer", padding: 0 }}>✕</button>}
              </div>
              <div style={{ marginBottom: 6 }}><Label>日期</Label><DateInput value={p.date} onChange={v => updatePurchase(i, "date", v)} /></div>
              <div style={{ marginBottom: 6 }}><Label>購買產品</Label><TextInput value={p.product} onChange={v => updatePurchase(i, "product", v)} placeholder="例：纖纖飲X" /></div>
              <div><Label>備註</Label><TextInput value={p.note} onChange={v => updatePurchase(i, "note", v)} placeholder="選填" /></div>
            </div>
          ))}
        </Card>
        <Card>
          <Label>產品吃法</Label>
          {[["morning", "早"], ["noon", "中"], ["evening", "晚"], ["sleep", "睡前"]].map(([k, l]) => (
            <div key={k} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <span style={{ fontSize: 13, color: "#A59482", fontWeight: 600, width: 32 }}>{l}</span>
              <div style={{ flex: 1 }}><TextInput value={usage[k]} onChange={v => setUsage(prev => ({ ...prev, [k]: v }))} placeholder="選填" /></div>
            </div>
          ))}
        </Card>
        <button onClick={handleSave} style={{ width: "100%", padding: 15, borderRadius: 14, border: "none", background: "linear-gradient(135deg,#A59482,#C6A992)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>
          💾 {customer ? "儲存修改" : "新增顧客"}
        </button>
      </div>
    </div>
  );
}

function CustomerDetail({ customer, salesRecords, onEdit, onDelete, onClose }) {
  const custSales = salesRecords.filter(r => r.type === "sale" && r.customerId === customer.id);
  const totalSpent = custSales.reduce((s, r) => s + r.totalRevenue, 0);
  const totalProfit = custSales.reduce((s, r) => s + r.netProfit, 0);
  return (
    <div style={{ position: "fixed", inset: 0, background: "#ede0d4", zIndex: 200, overflowY: "auto" }}>
      <div style={{ background: "linear-gradient(135deg,#A59482,#C6A992)", padding: "44px 20px 16px", color: "#fff", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#DBC8B6", fontSize: 22, cursor: "pointer", padding: 0 }}>←</button>
          <div style={{ fontSize: 18, fontWeight: 700 }}>{customer.name}</div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onEdit} style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", borderRadius: 8, padding: "6px 14px", fontSize: 13, cursor: "pointer" }}>編輯</button>
          <button onClick={onDelete} style={{ background: "rgba(192,57,43,0.3)", border: "none", color: "#ffc0b8", borderRadius: 8, padding: "6px 14px", fontSize: 13, cursor: "pointer" }}>刪除</button>
        </div>
      </div>
      <div style={{ padding: "16px 16px 80px" }}>
        <Card>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center", marginBottom: 12 }}>
            <span style={{ fontSize: 12, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: "#fef3e8", color: "#c17d2a" }}>{customer.platform}</span>
            <span style={{ fontSize: 12, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: "#f0f0ff", color: "#5050c0" }}>{customer.buyCount}</span>
            {customer.tags.map(t => <span key={t} style={{ fontSize: 12, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: "#e8f5ec", color: "#1a6b3a" }}>{t}</span>)}
          </div>
          <div style={{ fontSize: 13, color: "#A59482", lineHeight: 2 }}>
            📅 購買日期：{customer.buyDate || "—"}<br />
            💬 已關心：{customer.careDate || "—"}{customer.careNote ? ` · ${customer.careNote}` : ""}
          </div>
        </Card>
        {custSales.length > 0 && (
          <Card style={{ background: "linear-gradient(135deg,#A59482,#C6A992)", padding: 16 }}>
            <div style={{ color: "#DBC8B6", fontSize: 11, fontWeight: 700, marginBottom: 10 }}>此顧客累計</div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
                <div style={{ color: "#DBC8B6", fontSize: 11 }}>消費金額</div>
                <div style={{ color: "#fff", fontFamily: "monospace", fontSize: 16, fontWeight: 700 }}>{ntd(totalSpent)}</div>
              </div>
              <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
                <div style={{ color: "#DBC8B6", fontSize: 11 }}>貢獻利潤</div>
                <div style={{ color: "#7de8a8", fontFamily: "monospace", fontSize: 16, fontWeight: 700 }}>{ntd(totalProfit)}</div>
              </div>
            </div>
          </Card>
        )}
        {customer.purchases.some(p => p.product) && (
          <Card>
            <Label>購買紀錄</Label>
            {customer.purchases.filter(p => p.product).map((p, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #ede0d4" }}>
                <div><div style={{ fontSize: 14, color: "#A59482", fontWeight: 600 }}>{p.product}</div>{p.note && <div style={{ fontSize: 12, color: "#A59482" }}>{p.note}</div>}</div>
                <div style={{ fontSize: 12, color: "#C4B1A0" }}>{p.date}</div>
              </div>
            ))}
          </Card>
        )}
        {Object.values(customer.usage).some(v => v) && (
          <Card>
            <Label>產品吃法</Label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {[["morning", "早"], ["noon", "中"], ["evening", "晚"], ["sleep", "睡前"]].map(([k, l]) => customer.usage[k] ? (
                <div key={k} style={{ background: "#f7f2ee", borderRadius: 8, padding: "8px 10px" }}>
                  <div style={{ fontSize: 11, color: "#A59482", fontWeight: 700 }}>{l}</div>
                  <div style={{ fontSize: 13, color: "#A59482" }}>{customer.usage[k]}</div>
                </div>
              ) : null)}
            </div>
          </Card>

          <Card>
            <Label>App 銷售紀錄（{custSales.length} 筆）</Label>
            {custSales.map(r => (
              <div key={r.id} style={{ padding: "8px 0", borderBottom: "1px solid #ede0d4" }}>

                  <span style={{ fontSize: 13, color: "#A59482" }}>{r.date} · {r.items.map(i => i.name).join("、")}</span>
                  <span style={{ fontSize: 13, fontFamily: "monospace", color: "#1a6b3a", fontWeight: 700 }}>{ntd(r.netProfit)}</span>
                </div>
              </div>
            ))}
          </Card>
        )}
      </div>
    </div>
  );
}

function CustomersTab({ customers, onAdd, onUpdate, onDelete, salesRecords }) {
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editCustomer, setEditCustomer] = useState(null);
  const [viewCustomer, setViewCustomer] = useState(null);
  const [filterTag, setFilterTag] = useState("");

  // 計算購買日期距今天數
  const getDaysSince = (dateStr) => {
    if (!dateStr) return null;
    const parts = dateStr.replace(/\//g, "-").split("-");
    if (parts.length !== 3) return null;
    const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diff = Math.floor((today - d) / (1000 * 60 * 60 * 24));
    return isNaN(diff) ? null : diff;
  };

  // 判斷是否需要關心（第3天或第7天，且尚未關心）
  const getNeedFollowUp = (c) => {
    if (c.careDate) return null; // 已關心就不提醒
    const days = getDaysSince(c.buyDate);
    if (days === null) return null;
    if (days === 3) return { label: "第3天提醒", color: "#e67e22", bg: "#fff3e0", days };
    if (days === 7) return { label: "第7天提醒", color: "#c0392b", bg: "#fff0ee", days };
    if (days > 3 && days < 7 && !c.careDate) return { label: `第${days}天`, color: "#A59482", bg: "#faf6f2", days };
    if (days > 7 && !c.careDate) return { label: `第${days}天未關心`, color: "#c0392b", bg: "#fff0ee", days };
    return null;
  };

  // 排序：需要關心的排最前面（第7天 > 第3天 > 其他），再按購買日期新→舊
  const sortCustomers = (list) => {
    return [...list].sort((a, b) => {
      const fa = getNeedFollowUp(a);
      const fb = getNeedFollowUp(b);
      const urgencyA = fa ? (fa.days === 7 ? 0 : fa.days === 3 ? 1 : 2) : 99;
      const urgencyB = fb ? (fb.days === 7 ? 0 : fb.days === 3 ? 1 : 2) : 99;
      if (urgencyA !== urgencyB) return urgencyA - urgencyB;
      return 0;
    });
  };

  const filtered = sortCustomers(
    customers.filter(c => c.name.includes(search) && (filterTag === "" || c.tags.includes(filterTag)))
  );

  // 需要提醒的數量（第3天或第7天）
  const urgentCount = customers.filter(c => {
    const days = getDaysSince(c.buyDate);
    return !c.careDate && (days === 3 || days === 7);
  }).length;

  const handleSave = (c) => { if (editCustomer) onUpdate(c); else onAdd(c); setShowForm(false); setEditCustomer(null); };

  return (
    <div>
      {showForm && <CustomerForm customer={editCustomer} onSave={handleSave} onCancel={() => { setShowForm(false); setEditCustomer(null); }} />}
      {viewCustomer && <CustomerDetail customer={viewCustomer} salesRecords={salesRecords} onEdit={() => { setEditCustomer(viewCustomer); setShowForm(true); setViewCustomer(null); }} onDelete={() => { onDelete(viewCustomer.id); setViewCustomer(null); }} onClose={() => setViewCustomer(null)} />}

      {/* 提醒橫幅 */}
      {urgentCount > 0 && (
        <div style={{ background: "linear-gradient(135deg, #c0392b, #e67e22)", borderRadius: 14, padding: "12px 16px", marginBottom: 14, display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 24 }}>🔔</div>
          <div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>有 {urgentCount} 位顧客需要關心！</div>
            <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 12, marginTop: 2 }}>購買後第3天或第7天，記得主動聯繫 💬</div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋顧客..."
          style={{ flex: 1, border: "1.5px solid #DBC8B6", borderRadius: 10, padding: "10px 12px", fontSize: 15, background: "#fff", outline: "none" }} />
        <button onClick={() => { setEditCustomer(null); setShowForm(true); }} style={{ padding: "10px 16px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#A59482,#C6A992)", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: 700, whiteSpace: "nowrap" }}>＋ 新增</button>
      </div>
      <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 14, paddingBottom: 4 }}>
        <button onClick={() => setFilterTag("")} style={{ padding: "5px 12px", borderRadius: 20, border: "none", cursor: "pointer", background: filterTag === "" ? "#C6A992" : "#fff", color: filterTag === "" ? "#fff" : "#A59482", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", boxShadow: "0 1px 4px rgba(139,90,43,0.1)" }}>全部</button>
        {TAGS.map(t => <button key={t} onClick={() => setFilterTag(filterTag === t ? "" : t)} style={{ padding: "5px 12px", borderRadius: 20, border: "none", cursor: "pointer", background: filterTag === t ? "#C6A992" : "#fff", color: filterTag === t ? "#fff" : "#A59482", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", boxShadow: "0 1px 4px rgba(139,90,43,0.1)" }}>{t}</button>)}
      </div>
      {filtered.length === 0 && <div style={{ textAlign: "center", color: "#C4B1A0", padding: "40px 0", fontSize: 14 }}><div style={{ marginBottom: 12 }}>🐻 </div>{customers.length === 0 ? "還沒有顧客，點右上角「＋新增」" : "找不到符合的顧客"}</div>}
      {filtered.map(c => {
        const custSales = salesRecords.filter(r => r.type === "sale" && r.customerId === c.id);
        const followUp = getNeedFollowUp(c);
        const isUrgent = followUp && (followUp.days === 3 || followUp.days === 7);
        return (
          <Card key={c.id} style={{ padding: 0, overflow: "hidden", border: isUrgent ? `2px solid ${followUp.color}` : "none" }}>
            {isUrgent && (
              <div style={{ background: followUp.bg, padding: "6px 16px", display: "flex", alignItems: "center", gap: 6, borderBottom: `1px solid ${followUp.color}30` }}>
                <span style={{ fontSize: 14 }}>{followUp.days === 7 ? "🚨" : "⏰"}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: followUp.color }}>{followUp.label}｜記得關心這位顧客！</span>
              </div>
            )}
            <div onClick={() => setViewCustomer(c)} style={{ padding: "14px 16px", cursor: "pointer" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 15, color: "#A59482", marginBottom: 4 }}>{c.name}</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
                    <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: "#fef3e8", color: "#c17d2a", fontWeight: 600 }}>{c.platform}</span>
                    <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: "#f0f0ff", color: "#5050c0", fontWeight: 600 }}>{c.buyCount}</span>
                    {c.tags.slice(0, 2).map(t => <span key={t} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: "#e8f5ec", color: "#1a6b3a", fontWeight: 600 }}>{t}</span>)}
                    {followUp && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: followUp.bg, color: followUp.color, fontWeight: 600 }}>{followUp.label}</span>}
                  </div>
                  {c.buyDate && <div style={{ fontSize: 12, color: "#C4B1A0", marginTop: 4 }}>購買：{c.buyDate}{c.careDate ? ` · 關心：${c.careDate}` : ""}</div>}
                </div>
                <div style={{ textAlign: "right", marginLeft: 10 }}>
                  {custSales.length > 0 && <div style={{ fontSize: 12, color: "#1a6b3a", fontWeight: 600 }}>{custSales.length} 筆紀錄</div>}
                  <div style={{ fontSize: 16, color: "#C4B1A0" }}>›</div>
                </div>
              </div>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState(0);
  const [records, setRecords] = useState(() => { try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : []; } catch { return []; } });
  const [customers, setCustomers] = useState(() => { try { const s = localStorage.getItem(LS_CUSTOMERS); return s ? JSON.parse(s) : []; } catch { return []; } });
  const [importMsg, setImportMsg] = useState("");

  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(records)); } catch {} }, [records]);
  useEffect(() => { try { localStorage.setItem(LS_CUSTOMERS, JSON.stringify(customers)); } catch {} }, [customers]);

  const addRecord = useCallback((r) => setRecords(prev => [r, ...prev]), []);
  const deleteRecord = useCallback((id) => setRecords(prev => prev.filter(r => r.id !== id)), []);
  const addCustomer = useCallback((c) => setCustomers(prev => [c, ...prev]), []);
  const updateCustomer = useCallback((c) => setCustomers(prev => prev.map(x => x.id === c.id ? c : x)), []);
  const deleteCustomer = useCallback((id) => setCustomers(prev => prev.filter(c => c.id !== id)), []);

  // 計算累計硬幣：進貨 ÷100 + 銷售淨利 ÷10
  const totalCoins = Math.floor(
    records.filter(r => r.type === "stock").reduce((s, r) => s + r.totalCost, 0) / 100 +
    records.filter(r => r.type === "sale" && r.netProfit > 0).reduce((s, r) => s + r.netProfit, 0) / 10
  );

  const exportData = () => {
    const blob = new Blob([JSON.stringify({ records, customers }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `MORE專屬備份_${new Date().toLocaleDateString("zh-TW").replace(/\//g, "-")}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          setRecords(prev => { const ids = new Set(prev.map(r => r.id)); return [...data.filter(r => !ids.has(r.id)), ...prev]; });
          setImportMsg(`✅ 成功匯入 ${data.length} 筆紀錄！`);
        } else {
          if (data.records) setRecords(prev => { const ids = new Set(prev.map(r => r.id)); return [...data.records.filter(r => !ids.has(r.id)), ...prev]; });
          if (data.customers) setCustomers(prev => { const ids = new Set(prev.map(c => c.id)); return [...data.customers.filter(c => !ids.has(c.id)), ...prev]; });
          setImportMsg("✅ 成功匯入！");
        }
      } catch { setImportMsg("❌ 檔案格式錯誤"); }
      setTimeout(() => setImportMsg(""), 3000);
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div style={{ minHeight: "100vh", background: "#ede0d4", fontFamily: "-apple-system, sans-serif" }}>
